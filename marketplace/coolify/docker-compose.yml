# Cyrene deployment template for Coolify (R35).
# Required env vars: CYRENE_OPENAI_API_KEY, CYRENE_TELEGRAM_TOKEN (optional)

services:
  cyrene:
    image: cyrene/cyrene:latest
    container_name: cyrene-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - cyrene-data:/home/cyrene/.cyrene/data
    environment:
      - OPENAI_API_KEY=${CYRENE_OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${CYRENE_TELEGRAM_TOKEN:-}
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "cyrene", "doctor"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  cyrene-data:
