# Cyrene configuration — EXAMPLE.
#
# Copy this file to ~/.cyrene/config.toml and edit it:
#
#     mkdir -p ~/.cyrene && cp config.example.toml ~/.cyrene/config.toml
#
# This is the SINGLE configuration file for the whole agent (Requirement 2.5).
# Components are declared in a `[<type>.<alias>]` shape so you can register
# several instances of the same component type under different aliases.
#
# SECRETS ARE NEVER STORED HERE. Each entry references a secret only by the
# NAME of the environment variable that holds it (e.g. `api_key_env`,
# `token_env`). Put the actual values in a `.env` file (copy `.env.example`)
# or your real environment. This file is safe to commit/share.

# -----------------------------------------------------------------------------
# Model providers — [providers.<type>.<alias>]  (Requirement 12)
# -----------------------------------------------------------------------------

# A premium OpenAI model registered under the alias "coding".
[providers.openai.coding]
model = "gpt-4o"
tier = "Premium"
api_key_env = "OPENAI_API_KEY"

# A local Ollama model registered under the alias "local" (the router's default
# selection). Local providers usually need no API key.
[providers.ollama.local]
model = "llama3.1"
tier = "Local"
base_url = "http://localhost:11434"

# A generic OpenAI-compatible provider (e.g. DeepSeek) via a base URL override.
[providers.openai-compat.deepseek]
model = "deepseek-chat"
tier = "Premium"
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"

# Hosted OpenAI-compatible providers ship as built-in presets: the base URL and
# a default model are baked in, so you only need a key (and optionally a `model`
# or `base_url` override). Available types: groq, xai, mistral, deepseek,
# cohere, qwen, perplexity, moonshot, minimax, together, xiaomi, opencode.

# xAI Grok.
[providers.xai.grok]
api_key_env = "XAI_API_KEY"

# Groq — ultra-low-latency inference.
[providers.groq.fast]
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"

# Xiaomi MiMo (override base_url for a Token Plan regional endpoint).
[providers.xiaomi.mimo]
model = "mimo-v2-flash"
api_key_env = "XIAOMI_API_KEY"

# OpenCode Zen — curated, benchmarked coding models behind one key.
[providers.opencode.zen]
model = "claude-sonnet-4-5"
api_key_env = "OPENCODE_ZEN_API_KEY"

# -----------------------------------------------------------------------------
# Channels — [channels.<type>.<alias>]  (Requirement 7)
# -----------------------------------------------------------------------------

# The local CLI channel needs no token.
[channels.cli.default]

# A Telegram bot; `allowlist` restricts who may message it inbound (R22.5).
[channels.telegram.personal]
token_env = "TELEGRAM_BOT_TOKEN"
allowlist = ["123456789"]

# -----------------------------------------------------------------------------
# Memory backends — [memory.<type>.<alias>]  (Requirement 16)
# -----------------------------------------------------------------------------

# The default SQLite-backed memory graph.
[memory.sqlite.default]
path = "~/.cyrene/cyrene.db"

# -----------------------------------------------------------------------------
# Autonomy / security policy  (Requirement 22)
# -----------------------------------------------------------------------------
# These are the SECURE DEFAULTS and may be omitted entirely. They are shown
# here for visibility. Raising autonomy (e.g. setting `medium = "auto"`) is an
# explicit, reviewable change (R22.4).
[autonomy]
low = "auto"           # low-risk steps run automatically
medium = "approval"    # medium-risk steps require approval (R22.1)
high = "blocked"       # high-risk steps are blocked until autonomy is raised
require_gateway_auth = true  # network gateway requires authentication (R22.5)
# Commands allowed to run without per-step approval (R22.2). Empty by default.
command_allowlist = ["git", "ls", "cat"]

# -----------------------------------------------------------------------------
# Remote execution backend  (Requirement 33.5)
# -----------------------------------------------------------------------------
# By default Cyrene executes Steps LOCALLY inside the OS-level sandbox. You can
# instead run Steps on a remote SSH host or a container host, so heavy work runs
# off this machine. This only changes WHERE a Step runs — the autonomy policy,
# the workspace-boundary sandbox, and the Approval_Gate above still apply on
# every backend (R22/R6). There is intentionally no switch to disable gating for
# a remote backend. Omit this section entirely to keep the secure local default.
#
# As everywhere, NO secret values live here: an SSH key is referenced by the
# NAME of the env var holding its path (`key_env`), resolved from `.env`.

# [execution]
# backend = "ssh"            # one of: "local" (default), "ssh", "container"

# SSH backend — runs Steps on a remote host, confined to `remote_workspace`.
# [execution.ssh]
# host = "build.example.com"
# user = "cyrene"
# port = 22
# key_env = "CYRENE_SSH_KEY"            # env var holding the private-key PATH
# remote_workspace = "/srv/cyrene/workspace"   # boundary enforced on the remote
# strict_host_key_checking = true

# Container-host backend — runs Steps inside a container on a Docker host.
# [execution.container]
# host = "tcp://10.0.0.5:2376"          # omit for the local Docker socket
# image = "cyrene/runner:latest"
# remote_workspace = "/workspace"        # boundary enforced inside the container
# credential_env = "CYRENE_DOCKER_TLS"  # env var for a TLS cert path, if needed
